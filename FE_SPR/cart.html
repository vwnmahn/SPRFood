<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Giỏ hàng - SPRFood</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="cart.css">
    <script src="cart.js"></script>
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo-area">
                <a href="user.html" class="logo">SPRFood</a>
                <span class="tagline">Giao tận nơi, ngon trọn vị</span>
            </div>
            <a href="user.html" class="back-home"><i class="fas fa-arrow-left"></i> Tiếp tục mua sắm</a>
        </div>
    </header>

    <main class="cart-main">
        <div class="container">
            <h1><i class="fas fa-shopping-cart"></i> Giỏ hàng của bạn</h1>
            
            <div id="cartItems" class="cart-items"></div>
            
            <div id="cartSummary" class="cart-summary"></div>
            
            <div class="cart-actions">
                <button id="clearCartBtn" class="clear-cart-btn"><i class="fas fa-trash-alt"></i> Xóa tất cả</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col"><h4>SPRFood</h4><p>Mang ẩm thực chất lượng đến mọi nhà.</p></div>
                <div class="footer-col"><h4>Liên hệ</h4><p><i class="fas fa-phone"></i> 1900 1234</p></div>
                <div class="footer-col"><h4>Kết nối</h4><div class="social-links"><a href="#"><i class="fab fa-facebook-f"></i></a><a href="#"><i class="fab fa-instagram"></i></a></div></div>
            </div>
            <div class="copyright">© 2025 SPRFood</div>
        </div>
    </footer>

</body>
</html>
